name: Trend Monitoring Agent

on:
  schedule:
    # Every Monday at 13:00 UTC (adjust as needed)
    - cron: "0 13 * * 1"
  workflow_dispatch: {}  # lets you trigger a manual run from the Actions tab

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openai

      - name: Run trend agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python agent.py

      - name: Commit updated data.json
        run: |
          git config user.name "trend-agent"
          git config user.email "trend-agent@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update trend data $(date -u +%Y-%m-%d)"
          git push
